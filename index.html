<body style="background-color: #425378;"><!--灰色#f0f0f6-->

	<div class="container">
		<div class="row mt-5">

      <!-- Sidebar -->

      <!-- Main Content -->
      <div class="col-12 col-md-12 col-xl-9 bg-white mb-5 rounded-125 box-shadow p-4">
        <ul class="nav nav-pills nav-fill mb-3 mt-3 ml-3" id="pills-tab" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active rounded-pill font-size-25px" id="pills-youtube-tab" data-bs-toggle="pill" data-bs-target="#pills-youtube" type="button" role="tab" aria-selected="true">YouTube</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link rounded-pill font-size-25px" id="pills-ADandTeach-tab" data-bs-toggle="pill" data-bs-target="#pills-ADandTeach" type="button" role="tab" aria-selected="false">廣告及教學影片</button>
          </li>

        <div class="tab-content" id="pills-tabContent">

	</div>
	<script>
    // =============================================
    // videos contain
    // =============================================

    // 標籤設定：定義標籤名稱與對應的 Bootstrap 顏色 class
    const TAGS = {
      life:    { label: '生活類',   color: 'bg-greenlight' },
      interview: { label: '訪談類', color: 'bg-primary' },
      game:    { label: '遊戲類',   color: 'bg-danger' },
      product: { label: '產品廣告類', color: 'bg-warning text-dark' },
      comic:   { label: '漫畫廣告類', color: 'bg-warning text-dark' },
      course:  { label: '課程教學類', color: 'bg-green' },
      short:   { label: '短影音',   color: 'bg-info text-dark' },
    };

    // YouTube 影片（使用 YouTube 影片 ID，不需要完整網址）
    // 長影片
    const YOUTUBE_VIDEOS = [
      { id: '6NROHmVlntw', tag: 'life' },
      { id: 's7cRLEBogjk', tag: 'life' },
      { id: 'Hie_fSrpE68', tag: 'interview' },
      { id: 'r2oLdlPF6JI', tag: 'game' },
      { id: 'i53d-4WL0Ss', tag: 'game' },
      { id: 'NSHH2pM9iHo', tag: 'game' },
      { id: 'AM0XCr-dbjo', tag: 'game' },
      { id: 'zqV6uaTrjak', tag: 'game' },
    ];

    // 廣告及教學影片
    const ADTEACH_VIDEOS = [
      { id: '4g6Z8J-wAjY', tag: 'product' },
      { id: 'OD9JiqmqHrI', tag: 'product' },
      { id: 'fe8Gpei617w', tag: 'comic' },
      { id: 'fdXTgP0qkBA', tag: 'comic' },
      { id: 'kX5ea78UxYQ', tag: 'product' },
      { id: 'tvSzJyui6bc', tag: 'course' },
    ];

    // 短影音
    const SHORT_VIDEOS = [
      { id: 'Hxx997JGJ3g?si=oGAyIJglFr34RBtr', tag: 'short' },
      { id: '8l-IktPVmLQ?si=G9O7KaDqNKppAUIz', tag: 'short' },
      { id: '9jP9x4PHR8s?si=lfrBW1Wn70_0EqBZ', tag: 'short' },
      { id: 'hcFRacpSV2A?si=6OU7wKhWgBzUfoOl', tag: 'short' },
    ];

    // =============================================
    // render function
    // =============================================

    function buildEmbedUrl(videoId) {
      return `https://www.youtube.com/embed/${videoId}`;
    }

    function renderVideos(videos, containerId) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (videos.length === 0) {
        container.innerHTML = '<div class="col-12 text-center text-muted py-4">尚無影片</div>';
        return;
      }

      container.innerHTML = videos.map(video => {
        const tag = TAGS[video.tag] || { label: video.tag, color: 'bg-secondary' };
        return `
          <div class="col-md-6 mb-3">
            <div class="card">
              <div class="ratio ratio-16x9 card-img-top">
                <iframe
                  src="${buildEmbedUrl(video.id)}"
                  title="YouTube video player"
                  frameborder="0"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  referrerpolicy="strict-origin-when-cross-origin"
                  allowfullscreen>
                </iframe>
              </div>
              <div class="card-body">
                <p class="card-text">
                  <span class="font-size-unset badge rounded-pill ${tag.color}">${tag.label}</span>
                </p>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // load videos and render
    document.addEventListener('DOMContentLoaded', function () {
      renderVideos(YOUTUBE_VIDEOS, 'youtube-container');
      renderVideos(ADTEACH_VIDEOS, 'adteach-container');
      renderVideos(SHORT_VIDEOS, 'short-container');
    });
  </script>
</body>
</html>
